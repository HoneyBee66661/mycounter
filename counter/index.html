<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101418" />
    <meta name="description" content="Camera-based object counter with lasso and exclusion regions." />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Object Counter</title>
  </head>
  <body>
    <main class="app-shell" aria-label="Object counter camera app">
      <video id="camera" autoplay muted playsinline></video>
      <canvas id="overlay"></canvas>

      <section id="statusPanel" class="status-panel" aria-live="polite">
        <div id="countBadge" class="count-badge">
          <span id="liveCount">0</span>
          <small>count</small>
        </div>
        <div id="modelStatus" class="model-status">Loading model...</div>
      </section>

      <section id="messagePanel" class="message-panel" hidden>
        <h1 id="messageTitle">Camera unavailable</h1>
        <p id="messageText"></p>
        <button id="retryButton" type="button">Retry</button>
      </section>

      <div id="focusBar" class="focus-bar" hidden>
        <button id="focusContinuous" class="focus-chip" type="button" data-mode="continuous">AF-C</button>
        <button id="focusSingle" class="focus-chip" type="button" data-mode="single-shot">AF-S</button>
        <button id="focusManual" class="focus-chip" type="button" data-mode="manual">MF</button>
        <input type="range" id="focusSlider" class="focus-slider" min="0" max="1" step="0.01" value="0.5" hidden>
      </div>

      <nav class="toolbar" aria-label="Camera controls">
        <button id="lassoButton" class="tool-button" type="button" aria-pressed="false" title="Lasso tool">
          <span class="icon">L</span>
          <span class="tool-label">Lasso</span>
        </button>
        <button id="excludeButton" class="tool-button" type="button" aria-pressed="false" title="Exclude tool">
          <span class="icon">X</span>
          <span class="tool-label">Exclude</span>
        </button>
        <button id="galleryButton" class="tool-button" type="button" title="View gallery">
          <span class="icon">G</span>
          <span class="tool-label">Gallery</span>
        </button>
        <button id="flipButton" class="tool-button" type="button" title="Flip camera">
          <span class="icon">F</span>
          <span class="tool-label">Flip</span>
        </button>
        <button id="resetButton" class="tool-button" type="button" title="Reset regions">
          <span class="icon">R</span>
          <span class="tool-label">Reset</span>
        </button>
      </nav>

      <button id="shutterButton" class="shutter-button" type="button" title="Take photo">
        <span class="shutter-inner"></span>
      </button>

      <div id="shutterFlash" class="shutter-flash" hidden></div>

      <section id="galleryModal" class="gallery-modal" hidden>
        <div class="gallery-header">
          <span>Gallery</span>
          <button id="closeGallery" type="button">X</button>
        </div>
        <div id="galleryGrid" class="gallery-grid"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3"></script>
    <script src="./app.js"></script>
  </body>
</html>
